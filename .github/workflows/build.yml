name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: |
          mkdir -p www
          cp index.html www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$APK" ] || { echo "❌ APK not found"; exit 1; }
          SIZE=$(stat -c%s "$APK")
          [ "$SIZE" -gt 1048576 ] || { echo "❌ APK too small: $SIZE bytes"; exit 1; }
          file "$APK" | grep -q "Zip" || echo "⚠️ Not a zip, but continuing"
          echo "✅ APK verified: $(($SIZE/1024)) KB"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pawket-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: pawket-debug-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-debug.apk
          title: "Pawket ${{ github.ref_name }}"
          generate_release_notes: true
