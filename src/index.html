<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pawket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 16px; background: #1a1a2e; border-bottom: 1px solid #333; text-align: center; }
    .header h1 { font-size: 20px; color: #ff6b9d; }
    .header .subtitle { font-size: 12px; color: #888; margin-top: 4px; }
    .chat-area { flex: 1; overflow-y: auto; padding: 16px; }
    .message { margin-bottom: 12px; max-width: 85%; padding: 10px 14px; border-radius: 16px; line-height: 1.5; font-size: 14px; }
    .message.user { background: #2d5a8e; margin-left: auto; border-bottom-right-radius: 4px; }
    .message.assistant { background: #1e1e2e; margin-right: auto; border-bottom-left-radius: 4px; }
    .input-area { padding: 12px; background: #1a1a2e; border-top: 1px solid #333; display: flex; gap: 8px; }
    .input-area textarea { flex: 1; background: #252540; border: 1px solid #444; border-radius: 12px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 120px; }
    .input-area button { background: #ff6b9d; border: none; border-radius: 12px; padding: 10px 18px; color: white; font-weight: 600; cursor: pointer; }
    .input-area button:active { opacity: 0.7; }
    .provider-badge { display: inline-block; background: #ff6b9d22; color: #ff6b9d; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-top: 4px; }
    #status { text-align: center; padding: 8px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🐾 Pawket</h1>
    <div class="subtitle">Pocket-sized cat-paw AI</div>
    <div class="provider-badge" id="provider-badge">MiMo v2.5-pro</div>
  </div>
  <div class="chat-area" id="chat"></div>
  <div id="status"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const API_BASE = localStorage.getItem('api_base') || 'https://token-plan-cn.xiaomimo.com/v1';
    const API_KEY = localStorage.getItem('api_key') || '';
    const MODEL = localStorage.getItem('model') || 'mimo-v2.5-pro';
    const chat = document.getElementById('chat');
    const status = document.getElementById('status');
    const input = document.getElementById('input');

    let messages = [];

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      messages.push({ role, content });
    }

    function setStatus(msg) { status.textContent = msg; }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      setStatus('Thinking...');

      if (!API_KEY) {
        addMessage('assistant', '⚠️ No API key configured. Please set api_key in localStorage or environment.');
        setStatus('');
        return;
      }

      try {
        const resp = await fetch(`${API_BASE}/chat/completions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messages,
            stream: false
          })
        });
        const data = await resp.json();
        if (data.choices && data.choices[0]) {
          addMessage('assistant', data.choices[0].message.content);
        } else {
          addMessage('assistant', 'Error: ' + JSON.stringify(data));
        }
      } catch (e) {
        addMessage('assistant', 'Network error: ' + e.message);
      }
      setStatus('');
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Config panel with long press
    let pressTimer;
    document.getElementById('provider-badge').addEventListener('mousedown', () => {
      pressTimer = setTimeout(() => {
        const base = prompt('API Base URL:', API_BASE);
        if (base) localStorage.setItem('api_base', base);
        const key = prompt('API Key:', API_KEY);
        if (key) localStorage.setItem('api_key', key);
        const model = prompt('Model:', MODEL);
        if (model) localStorage.setItem('model', model);
        location.reload();
      }, 1000);
    });
    document.getElementById('provider-badge').addEventListener('mouseup', () => clearTimeout(pressTimer));
    document.getElementById('provider-badge').addEventListener('mouseleave', () => clearTimeout(pressTimer));

    // Init
    if (!API_KEY) setStatus('⚠️ Long-press the provider badge to configure API key');
  </script>
</body>
</html>
